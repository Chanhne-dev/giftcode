name: GiftCode
version: 1.3.0
main: giftcodeplugin.Main_GiftCode
api-version: '1.21'
softdepend:
  - Vault

commands:
  gc:
    description: Quản lý mã quà tặng (admin)
    usage: /gc <create|delete|reload|enable|disable|list|whitelist|permission>
    permission: giftcode.admin
    permission-message: "§cBạn không có quyền sử dụng lệnh này!"
  code:
    description: Sử dụng mã quà tặng (cho người chơi)
    usage: /code <mã_code>
permissions:
  giftcode.admin:
    description: Cho phép sử dụng lệnh /gc (tạo, xóa, reload, ...)
    default: op